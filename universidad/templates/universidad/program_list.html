{% extends "universidad/base.html" %}

{% block content %}

<h1>Programas</h1>

<ul>
{% for program in programs %}
    <li>
        <a href="{% url 'universidad:program_detail' program.id %}">
            {{ program.name }} - {{ program.type_program }}
        </a>
    </li>
{% endfor %}
</ul>

{% endblock %}
