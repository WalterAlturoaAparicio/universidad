{% extends "universidad/base.html" %}

{% block content %}

<h1>{{ student.name }}</h1>

<h2>Cursos inscritos</h2>

<ul>
{% for ins in student.inscriptions.all %}
    <li>
        <a href="{% url 'universidad:course_detail' ins.course.id %}">
            {{ ins.course.name }}
        </a>
    </li>
{% empty %}
    <li>No está inscrito en cursos</li>
{% endfor %}
</ul>

{% endblock %}
